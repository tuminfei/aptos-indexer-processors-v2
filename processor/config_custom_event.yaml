# Custom Event Processor Configuration
health_check_port: 9080
server_config:
  processor_config:
    type: custom_event_processor
    channel_size: 100
    tables_to_write: ["custom_events"]
    per_table_chunk_sizes:
      custom_events: 1000
  processor_mode:
    type: default
    initial_starting_version: 0
  transaction_stream_config:
    indexer_grpc_data_service_address: "http://127.0.0.1:50051"
    auth_token: "AUTH_TOKEN"
    request_name_header: "custom_event_processor"
  db_config:
    type: postgres_config
    connection_string: "postgresql://aptos:aptos123@localhost:5432/topo_indexer_dev"
